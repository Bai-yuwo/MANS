<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANS 监控系统</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        h1 { color: #00d4ff; margin-bottom: 20px; font-size: 24px; }
        
        /* 状态栏 */
        .status-bar { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .status-item { 
            background: #16213e; 
            padding: 15px 20px; 
            border-radius: 8px; 
            min-width: 150px;
        }
        .status-item .label { font-size: 12px; color: #888; margin-bottom: 5px; }
        .status-item .value { font-size: 18px; font-weight: bold; }
        
        /* 流水线监控 */
        .pipeline-monitor { background: #16213e; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .pipeline-stages { display: flex; gap: 10px; margin-top: 15px; }
        .stage {
            flex: 1;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            background: #0f3460;
            transition: all 0.3s;
        }
        .stage.active { background: #e94560; box-shadow: 0 0 20px rgba(233,69,96,0.5); }
        .stage.completed { background: #00bf63; }
        .stage.pending { opacity: 0.5; }
        .stage-name { font-weight: bold; margin-bottom: 5px; }
        .stage-status { font-size: 12px; color: #aaa; }
        
        /* 事件日志 */
        .event-log { 
            background: #16213e; 
            border-radius: 12px; 
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
        }
        .event-log h2 { font-size: 16px; margin-bottom: 15px; color: #00d4ff; }
        .event-item { 
            padding: 10px; 
            margin-bottom: 8px; 
            border-radius: 6px; 
            font-family: 'Consolas', monospace;
            font-size: 13px;
            background: #0f3460;
        }
        .event-item.system { border-left: 3px solid #00d4ff; }
        .event-item.agent { border-left: 3px solid #e94560; }
        .event-item.chunk { border-left: 3px solid #00bf63; }
        .event-item.error { border-left: 3px solid #ff4757; background: rgba(255,71,87,0.1); }
        
        .event-time { color: #666; font-size: 11px; margin-right: 10px; }
        .event-agent { 
            font-weight: bold; 
            margin-right: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
        .event-agent.SYSTEM { background: #00d4ff; color: #000; }
        .event-agent.PLOT { background: #9b59b6; }
        .event-agent.WRITER { background: #e94560; }
        .event-agent.VALIDATOR { background: #00bf63; }
        
        .event-content { margin-top: 5px; color: #ccc; }
        
        /* 输入区 */
        .input-section { background: #16213e; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .input-section textarea { 
            width: 100%; 
            padding: 15px; 
            border-radius: 8px; 
            border: none;
            background: #0f3460;
            color: #fff;
            font-size: 14px;
            resize: vertical;
            min-height: 100px;
        }
        .input-section button {
            margin-top: 10px;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            background: #e94560;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .input-section button:hover { background: #ff6b81; }
        .input-section button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* 导航 */
        .nav { 
            background: #16213e; 
            padding: 15px 20px; 
            margin-bottom: 20px;
            border-radius: 12px;
            display: flex;
            gap: 20px;
        }
        .nav a { 
            color: #00d4ff; 
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.3s;
        }
        .nav a:hover { background: #0f3460; }
        .nav a.active { background: #e94560; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <a href="/">创作</a>
            <a href="/monitor" class="active">监控</a>
        </nav>
        
        <h1>MANS 智能体协作监控</h1>
        
        <div class="status-bar">
            <div class="status-item">
                <div class="label">系统状态</div>
                <div class="value" id="systemStatus">就绪</div>
            </div>
            <div class="status-item">
                <div class="label">当前任务</div>
                <div class="value" id="currentTask">无</div>
            </div>
            <div class="status-item">
                <div class="label">事件总数</div>
                <div class="value" id="eventCount">0</div>
            </div>
            <div class="status-item">
                <div class="label">最后更新</div>
                <div class="value" id="lastUpdate">--</div>
            </div>
        </div>
        
        <div class="pipeline-monitor">
            <h2>三阶段流水线</h2>
            <div class="pipeline-stages">
                <div class="stage pending" id="stage-plot">
                    <div class="stage-name">Plot Agent</div>
                    <div class="stage-status">情节构建</div>
                </div>
                <div class="stage pending" id="stage-writer">
                    <div class="stage-name">Writer Agent</div>
                    <div class="stage-status">章节写作</div>
                </div>
                <div class="stage pending" id="stage-validator">
                    <div class="stage-name">Validator Agent</div>
                    <div class="stage-status">内容验证</div>
                </div>
            </div>
        </div>
        
        <div class="input-section">
            <h2>发送请求</h2>
            <textarea id="requestInput" placeholder="输入小说创作需求...">写一个都市奇幻小说，主角是一个普通的上班族，某天发现自己能看见鬼魂</textarea>
            <button onclick="runPipeline()" id="runBtn">运行流水线</button>
        </div>
        
        <div class="event-log">
            <h2>实时事件流 <button onclick="clearLog()" style="margin-left:10px;padding:5px 10px;font-size:12px;background:#0f3460;border:none;color:#fff;border-radius:4px;cursor:pointer;">清空</button></h2>
            <div id="eventList"></div>
        </div>
    </div>

    <script>
        let currentTaskId = null;
        let eventCount = 0;
        const eventList = document.getElementById('eventList');
        
        async function runPipeline() {
            const request = document.getElementById('requestInput').value;
            const btn = document.getElementById('runBtn');
            
            btn.disabled = true;
            document.getElementById('currentTask').textContent = '运行中...';
            document.getElementById('systemStatus').textContent = '处理中';
            
            resetStages();
            
            try {
                const resp = await fetch('/api/pipeline', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_request: request})
                });
                const data = await resp.json();
                currentTaskId = data.task_id;
                
                // 连接SSE
                connectStream(data.task_id);
            } catch (e) {
                addEvent('error', 'SYSTEM', '请求失败: ' + e.message);
                btn.disabled = false;
            }
        }
        
        function connectStream(taskId) {
            const es = new EventSource(`/api/pipeline/${taskId}/stream`);
            
            es.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    handleEvent(data);
                } catch {}
            };
            
            es.onerror = () => {
                addEvent('system', 'SYSTEM', '连接断开');
                document.getElementById('runBtn').disabled = false;
                document.getElementById('systemStatus').textContent = '就绪';
                es.close();
            };
        }
        
        function handleEvent(data) {
            const type = data.type || 'unknown';
            const agent = data.agent || 'SYSTEM';
            const content = data.data || {};
            
            // 更新阶段状态
            if (agent === 'PLOT') {
                document.getElementById('stage-plot').classList.add('active');
                document.getElementById('stage-plot').classList.remove('pending');
            }
            
            if (agent === 'WRITER') {
                document.getElementById('stage-plot').classList.remove('active');
                document.getElementById('stage-plot').classList.add('completed');
                document.getElementById('stage-writer').classList.add('active');
                document.getElementById('stage-writer').classList.remove('pending');
            }
            
            if (agent === 'VALIDATOR') {
                document.getElementById('stage-writer').classList.remove('active');
                document.getElementById('stage-writer').classList.add('completed');
                document.getElementById('stage-validator').classList.add('active');
                document.getElementById('stage-validator').classList.remove('pending');
            }
            
            // 记录事件
            if (type === 'status') {
                addEvent('agent', agent, content.message || JSON.stringify(content));
            } else if (type === 'chunk') {
                addEvent('chunk', agent, content.content || '');
            } else if (type === 'result') {
                addEvent('agent', agent, '完成');
                document.getElementById('stage-validator').classList.add('completed');
                document.getElementById('currentTask').textContent = '完成';
                document.getElementById('systemStatus').textContent = '就绪';
                document.getElementById('runBtn').disabled = false;
            } else if (type === 'error') {
                addEvent('error', agent, content.message || '未知错误');
                document.getElementById('systemStatus').textContent = '错误';
            }
            
            // 更新统计
            eventCount++;
            document.getElementById('eventCount').textContent = eventCount;
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
        }
        
        function addEvent(type, agent, content) {
            const div = document.createElement('div');
            div.className = `event-item ${type}`;
            div.innerHTML = `
                <span class="event-time">${new Date().toLocaleTimeString()}</span>
                <span class="event-agent ${agent}">${agent}</span>
                <div class="event-content">${escapeHtml(content)}</div>
            `;
            eventList.insertBefore(div, eventList.firstChild);
            
            // 限制显示数量
            while (eventList.children.length > 100) {
                eventList.removeChild(eventList.lastChild);
            }
        }
        
        function resetStages() {
            ['plot', 'writer', 'validator'].forEach(s => {
                const el = document.getElementById(`stage-${s}`);
                el.className = 'stage pending';
            });
        }
        
        function clearLog() {
            eventList.innerHTML = '';
            eventCount = 0;
            document.getElementById('eventCount').textContent = '0';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
