<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>MANS</title>
    <link href="/frontend/styles.css" rel="stylesheet">
</head>
<body>
    <!-- 上边栏 -->
    <div class="top-bar">
        <div class="top-bar-icon" title="菜单">
            <svg viewBox="0 0 24 24">
                <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
            </svg>
        </div>
    </div>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 左侧边栏 -->
        <div class="sidebar">
            <ul class="sidebar-menu">
                <li class="sidebar-item active" data-panel="works">
                    <svg viewBox="0 0 24 24">
                        <path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z"/>
                    </svg>
                    <span class="sidebar-item-text">作品创作</span>
                </li>
                <li class="sidebar-item" data-panel="settings">
                    <svg viewBox="0 0 24 24">
                        <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
                    </svg>
                    <span class="sidebar-item-text">系统设置</span>
                </li>
                <li class="sidebar-item" data-panel="monitor">
                    <svg viewBox="0 0 24 24">
                        <path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/>
                    </svg>
                    <span class="sidebar-item-text">实时监控</span>
                </li>
            </ul>
        </div>

        <!-- 内容区域 -->
        <div class="content-area">
            <!-- 作品创作面板 -->
            <div class="content-panel active" id="works-panel">
                <!-- top栏 -->
                <div id="works-select-container"
                     style="height: 40px;
                            display: grid;
                            grid-template-columns: 1fr auto 1fr;
                            align-items: center;
                            margin-top:10px">
                    <!-- 中央选择区 -->
                    <div style="display: flex;grid-column: 2/3;justify-content: center; align-items: center;">
                        <label>
                            当前作品:
                        </label>
                        <select id="works-select" style="width: 200px;text-align: center;">
                            <option value="">请选择作品</option>
                        </select>
                    </div>
                    <!-- 右侧按钮区 -->
                    <button class="mans-btn primary"
                            id="works-add-btn"
                            style="grid-column: 3/4;
                                   width: 100px;
                                   justify-self: end;
                                   margin-right: 20px">
                        创建作品
                    </button>
                </div>
                <!-- 作品内容 -->
                <div id="works-content" style="padding: 10px;">
                    <div id="project-list" class="project-grid">
                        <!-- 项目列表将动态加载 -->
                    </div>
                </div>
            </div>

            <!-- 创建项目模态框 -->
            <div id="create-project-modal" class="modal" style="display: none;">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>创建新作品</h3>
                        <button class="close-btn" onclick="closeCreateModal()">&times;</button>
                    </div>
                    <form id="create-project-form">
                        <div class="form-group">
                            <label>作品名称 *</label>
                            <input type="text" name="name" required placeholder="请输入作品名称">
                        </div>
                        <div class="form-group">
                            <label>类型</label>
                            <select name="genre">
                                <option value="玄幻">玄幻</option>
                                <option value="仙侠">仙侠</option>
                                <option value="都市">都市</option>
                                <option value="科幻">科幻</option>
                                <option value="武侠">武侠</option>
                                <option value="历史">历史</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>核心Idea *</label>
                            <textarea name="core_idea" required rows="3" placeholder="用1-3句话描述故事核心"></textarea>
                        </div>
                        <div class="form-group">
                            <label>主角起点 *</label>
                            <input type="text" name="protagonist_seed" required placeholder="如：山村少年，天生灵根">
                        </div>
                        <div class="form-group">
                            <label>目标篇幅</label>
                            <select name="target_length">
                                <option value="中篇(10-50万)">中篇(10-50万)</option>
                                <option value="长篇(50-200万)">长篇(50-200万)</option>
                                <option value="短篇(<10万)">短篇(<10万)</option>
                                <option value="超长篇(200万+)">超长篇(200万+)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>基调</label>
                            <input type="text" name="tone" placeholder="如：热血励志、轻松搞笑">
                        </div>
                        <div class="form-group">
                            <label>文风参考</label>
                            <textarea name="style_reference" rows="2" placeholder="参考作家或作品风格"></textarea>
                        </div>
                        <div class="form-group">
                            <label>禁忌元素</label>
                            <input type="text" name="forbidden_elements" placeholder="用逗号分隔，如：穿越,系统">
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="mans-btn primary">创建</button>
                            <button type="button" class="mans-btn" onclick="closeCreateModal()">取消</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- 初始化流程面板 -->
            <div class="content-panel" id="initialization-panel">
                <h3>初始化流程</h3>
                <div class="init-steps">
                    <div class="init-step pending" id="bible-step">
                        <div class="step-header">
                            <span class="step-number">1</span>
                            <span class="step-title">生成世界观Bible</span>
                        </div>
                        <div class="step-content">
                            <p>基于您的创作信息生成完整的世界观设定</p>
                            <button id="generate-bible-btn" class="mans-btn primary">生成 Bible</button>
                        </div>
                    </div>
                    <div class="init-step pending" id="character-step">
                        <div class="step-header">
                            <span class="step-number">2</span>
                            <span class="step-title">生成人物设定</span>
                        </div>
                        <div class="step-content">
                            <p>生成主角和主要配角的人物卡</p>
                            <button id="generate-characters-btn" class="mans-btn" disabled>生成人物</button>
                        </div>
                    </div>
                    <div class="init-step pending" id="outline-step">
                        <div class="step-header">
                            <span class="step-number">3</span>
                            <span class="step-title">生成全局大纲</span>
                        </div>
                        <div class="step-content">
                            <p>生成三幕式结构和关键转折点</p>
                            <button id="generate-outline-btn" class="mans-btn" disabled>生成大纲</button>
                        </div>
                    </div>
                </div>
                <div id="bible-display" class="init-result"></div>
                <button id="enter-writing-btn" class="mans-btn primary" style="display: none; margin-top: 20px;">进入写作</button>
            </div>

            <!-- 写作面板 -->
            <div class="content-panel" id="writing-panel">
                <div class="writing-header">
                    <h3>写作界面</h3>
                    <div class="writing-actions">
                        <button id="view-kb-btn" class="mans-btn">查看知识库</button>
                        <button id="confirm-chapter-btn" class="mans-btn primary">确认本章</button>
                    </div>
                </div>
                <div id="chapter-plan-display" class="chapter-content">
                    <!-- 章节规划将动态加载 -->
                </div>
            </div>

            <!-- 知识库面板 -->
            <div class="content-panel" id="knowledge-panel">
                <h3>知识库</h3>
                <div id="knowledge-display">
                    <!-- 知识库内容将动态加载 -->
                </div>
            </div>

            <!-- 系统设置面板 -->
            <div class="content-panel" id="settings-panel">

            </div>

            <!-- 实时监控面板 -->
            <div class="content-panel" id="monitor-panel">

            </div>
        </div>
    </div>

    <!-- 流式输出面板容器 -->
    <div id="streaming-container"></div>

    <script>
    // 加载流式面板组件
    fetch('/frontend/streaming-panel.html')
        .then(res => res.text())
        .then(html => {
            document.getElementById('streaming-container').innerHTML = html;
            console.log('流式面板已加载');
        })
        .catch(err => console.error('加载流式面板失败:', err));
    </script>

    <!-- SSE客户端 -->
    <script src="/frontend/streaming-client.js"></script>

    <script src="/frontend/app.js"></script>
</body>
</html>
