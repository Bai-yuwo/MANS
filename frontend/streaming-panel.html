<!-- 流式输出面板组件 -->

<style>
/* 流式输出面板样式 */
.streaming-panel {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 600px;
    max-height: 500px;
    background: white;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    z-index: 1000;
    display: none;
    flex-direction: column;
}

.streaming-panel.active {
    display: flex;
}

.streaming-panel-header {
    padding: 12px 16px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border-radius: 8px 8px 0 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.streaming-panel-title {
    font-weight: 600;
    font-size: 14px;
}

.streaming-panel-close {
    background: none;
    border: none;
    color: white;
    cursor: pointer;
    font-size: 20px;
    padding: 0;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    transition: background 0.2s;
}

.streaming-panel-close:hover {
    background: rgba(255,255,255,0.2);
}

.streaming-panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.6;
    background: #f8f9fa;
}

.streaming-panel-footer {
    padding: 12px 16px;
    border-top: 1px solid #e5e7eb;
    background: white;
    border-radius: 0 0 8px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.streaming-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #6b7280;
}

.streaming-status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #10b981;
    animation: pulse 2s infinite;
}

.streaming-status-dot.error {
    background: #ef4444;
    animation: none;
}

.streaming-status-dot.complete {
    background: #3b82f6;
    animation: none;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

.streaming-log {
    margin-bottom: 8px;
    padding: 8px;
    border-radius: 4px;
    background: white;
    border-left: 3px solid #667eea;
}

.streaming-log.progress {
    border-left-color: #f59e0b;
}

.streaming-log.token {
    border-left-color: #10b981;
    white-space: pre-wrap;
    word-break: break-word;
}

.streaming-log.error {
    border-left-color: #ef4444;
    background: #fef2f2;
}

.streaming-log.complete {
    border-left-color: #3b82f6;
    background: #eff6ff;
}

.streaming-log-time {
    font-size: 11px;
    color: #9ca3af;
    margin-bottom: 4px;
}

.streaming-log-content {
    color: #374151;
}

.streaming-actions {
    display: flex;
    gap: 8px;
}

.btn-streaming {
    padding: 6px 12px;
    border: 1px solid #d1d5db;
    border-radius: 4px;
    background: white;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
}

.btn-streaming:hover {
    background: #f3f4f6;
    border-color: #9ca3af;
}

.btn-streaming:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
</style>

<div id="streaming-panel" class="streaming-panel">
    <div class="streaming-panel-header">
        <span class="streaming-panel-title" id="streaming-panel-title">生成中...</span>
        <button class="streaming-panel-close" onclick="closeStreamingPanel()">×</button>
    </div>
    <div class="streaming-panel-body" id="streaming-panel-body">
        <!-- 流式日志将在这里显示 -->
    </div>
    <div class="streaming-panel-footer">
        <div class="streaming-status">
            <div class="streaming-status-dot" id="streaming-status-dot"></div>
            <span id="streaming-status-text">准备中...</span>
        </div>
        <div class="streaming-actions">
            <button class="btn-streaming" id="btn-copy-output" onclick="copyStreamingOutput()" disabled>复制内容</button>
            <button class="btn-streaming" id="btn-close-panel" onclick="closeStreamingPanel()">关闭</button>
        </div>
    </div>
</div>
