<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANS - 多智能体小说系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4a4a4a; }
    </style>
</head>
<body class="h-full bg-gray-950 text-gray-100 font-mono flex flex-col">
    <header class="bg-gray-900 border-b border-gray-800 px-6 py-3 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div>
            <h1 class="text-lg font-bold tracking-wider">
                <span class="text-emerald-400">MANS</span>
                <span class="text-gray-500">// 控制面板</span>
            </h1>
        </div>
        <div id="connectionStatus" class="flex items-center gap-2 text-sm">
            <span class="w-2 h-2 rounded-full bg-red-500"></span>
            <span class="text-gray-500">未连接</span>
        </div>
    </header>

    <main class="flex-1 flex gap-4 p-4 overflow-hidden min-h-0">
        <aside class="w-80 flex flex-col gap-4 shrink-0 overflow-y-auto">
            <div class="bg-gray-900 rounded-lg border border-gray-800 p-4 flex flex-col gap-4">
                <h2 class="text-emerald-400 text-sm font-bold flex items-center gap-2">控制台</h2>

                <div class="flex flex-col gap-3 border-b border-gray-800 pb-4">
                    <div>
                        <label class="text-gray-400 text-xs uppercase">项目名称 (对应 workspace 目录)</label>
                        <input type="text" id="projectName" value="default_project"
                               class="mt-1 w-full bg-gray-950 border border-gray-700 rounded p-2 text-sm focus:border-emerald-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="text-gray-400 text-xs uppercase">章节标题 (用于保存草稿)</label>
                        <input type="text" id="chapterTitle" value="第一章_初临"
                               class="mt-1 w-full bg-gray-950 border border-gray-700 rounded p-2 text-sm focus:border-emerald-500 focus:outline-none">
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-gray-400 text-xs uppercase">短期情节指示 (Plot)</label>
                    <textarea id="plotInput" class="w-full h-40 bg-gray-950 border border-gray-700 rounded-lg p-3 text-sm resize-none focus:border-emerald-500 focus:outline-none placeholder-gray-600"
                    >叶千凡在雨夜中醒来，失去了关于“系统”的全部记忆。</textarea>
                </div>

                <button id="sendBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-lg transition-all flex items-center justify-center gap-2">
                    触发写作智能体 (WriterAgent)
                </button>
            </div>

            <div class="bg-gray-900 rounded-lg border border-gray-800 p-4 mt-auto">
                <div class="flex justify-between text-xs mb-2">
                    <span class="text-gray-500">生成字数:</span>
                    <span id="tokenCount" class="text-emerald-400">0</span>
                </div>
                <div class="flex justify-between text-xs">
                    <span class="text-gray-500">流转事件:</span>
                    <span id="eventCount" class="text-blue-400">0</span>
                </div>
            </div>
        </aside>

        <section class="flex-1 flex flex-col gap-4 min-w-0">
            <div class="flex-[3] flex flex-col bg-gray-900 rounded-lg border border-gray-800 min-h-0">
                <div class="px-4 py-2 border-b border-gray-800 bg-black/20">
                    <h2 class="text-purple-400 text-sm font-bold tracking-wider">实时正文预览</h2>
                </div>
                <div id="novelOutput" class="flex-1 p-6 overflow-y-auto text-gray-200 leading-loose text-lg whitespace-pre-wrap"></div>
            </div>

            <div class="flex-[2] flex flex-col bg-black rounded-lg border border-gray-800 min-h-0">
                <div class="px-4 py-2 border-b border-gray-800 bg-gray-900/50">
                    <h2 class="text-emerald-400 text-sm font-bold tracking-wider">事件流转日志 (EventBus)</h2>
                </div>
                <div id="systemLog" class="flex-1 p-4 overflow-y-auto text-xs font-mono"></div>
            </div>
        </section>
    </main>

    <script type="module" src="/app.js"></script>
</body>
</html>
