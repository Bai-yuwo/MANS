<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANS - 多智能体小说系统</title>
    <!-- TailwindCSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        /* 自定义滚动条 - 暗色风格 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4a4a4a;
        }
        /* 终端文字发光效果 */
        .glow-text {
            text-shadow: 0 0 2px currentColor;
        }
    </style>
</head>
<body class="h-full bg-gray-950 text-gray-100 font-mono">
    <div class="h-full flex flex-col">
        <!-- 顶部标题栏 -->
        <header class="bg-gray-900 border-b border-gray-800 px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div>
                <h1 class="text-lg font-bold tracking-wider">
                    <span class="text-emerald-400">MANS</span>
                    <span class="text-gray-500">// 多智能体小说系统</span>
                </h1>
            </div>
            <div id="connectionStatus" class="flex items-center gap-2 text-sm">
                <span class="w-2 h-2 rounded-full bg-red-500"></span>
                <span class="text-gray-500">SSE 未连接</span>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="flex-1 flex gap-4 p-4 overflow-hidden">
            <!-- 左侧控制区 -->
            <aside class="w-80 flex flex-col gap-4">
                <div class="bg-gray-900 rounded-lg border border-gray-800 p-4 flex flex-col gap-4">
                    <h2 class="text-emerald-400 text-sm font-bold tracking-widest flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
                        </svg>
                        控制台
                    </h2>
                    
                    <!-- 剧情输入区 -->
                    <div class="flex flex-col gap-2">
                        <label class="text-gray-400 text-xs uppercase tracking-wider">剧情提示 (Plot)</label>
                        <textarea 
                            id="plotInput"
                            class="w-full h-48 bg-gray-950 border border-gray-700 rounded-lg p-3 text-sm resize-none focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors placeholder-gray-600"
                            placeholder="输入小说情节描述..."
                        >男主在雨夜中醒来，失去了记忆。</textarea>
                    </div>

                    <!-- 发送按钮 -->
                    <button 
                        id="sendBtn"
                        class="w-full bg-emerald-600 hover:bg-emerald-500 disabled:bg-gray-700 disabled:cursor-not-allowed text-white font-bold py-3 px-4 rounded-lg transition-all flex items-center justify-center gap-2"
                    >
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                        发送命令 (DRAFT_CHAPTER)
                    </button>
                </div>

                <!-- 状态信息卡片 -->
                <div class="bg-gray-900 rounded-lg border border-gray-800 p-4">
                    <h2 class="text-emerald-400 text-sm font-bold tracking-widest mb-3">系统状态</h2>
                    <div class="space-y-2 text-xs">
                        <div class="flex justify-between">
                            <span class="text-gray-500">最后事件:</span>
                            <span id="lastEventType" class="text-gray-400">-</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-500">Token计数:</span>
                            <span id="tokenCount" class="text-emerald-400">0</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-500">事件总数:</span>
                            <span id="eventCount" class="text-blue-400">0</span>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- 右侧内容区 -->
            <section class="flex-1 flex flex-col gap-4 overflow-hidden">
                <!-- 小说流式输出区 -->
                <div class="flex-1 flex flex-col bg-gray-800/50 rounded-lg border border-gray-700 overflow-hidden">
                    <div class="bg-gray-900/50 px-4 py-2 border-b border-gray-700 flex items-center gap-2">
                        <svg class="w-4 h-4 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        <h2 class="text-purple-400 text-sm font-bold tracking-wider">小说流式输出</h2>
                    </div>
                    <div 
                        id="novelOutput" 
                        class="flex-1 p-4 overflow-y-auto text-gray-100 leading-relaxed"
                        style="background: linear-gradient(to bottom, #1a1a2e 0%, #16213e 100%);"
                    >
                        <p class="text-gray-500 italic">等待生成内容...</p>
                    </div>
                </div>

                <!-- 白盒系统日志区 -->
                <div class="h-64 flex flex-col bg-gray-950 rounded-lg border border-gray-800 overflow-hidden">
                    <div class="bg-black/50 px-4 py-2 border-b border-gray-800 flex items-center gap-2">
                        <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        </svg>
                        <h2 class="text-emerald-400 text-sm font-bold tracking-wider">白盒系统日志</h2>
                    </div>
                    <div 
                        id="systemLog" 
                        class="flex-1 p-4 overflow-y-auto font-mono text-xs"
                    >
                        <!-- 日志条目将动态插入 -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- 引入应用脚本 -->
    <script type="module" src="app.js"></script>
</body>
</html>
